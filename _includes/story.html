<section id="story" class="section section--cream story">
  <div class="story__inner">
    <div class="eyebrow section-eyebrow">{{ site.story.eyebrow }}</div>
    <h2 class="section-title story__heading">{{ site.story.heading }}</h2>
    {% for paragraph in site.story.paragraphs %}
      <p class="story__body">{{ paragraph }}</p>
    {% endfor %}

    <div class="divider">
      <span class="divider__line"></span>
      <svg class="sprig" width="34" height="18" viewBox="0 0 60 32" aria-hidden="true" focusable="false">
        <line x1="6" y1="16" x2="54" y2="16" stroke="#b07a5e" stroke-width="1.2"></line>
        <ellipse cx="20" cy="9" rx="8" ry="3.4" fill="#c98e74" transform="rotate(-22 20 9)"></ellipse>
        <ellipse cx="34" cy="9" rx="8" ry="3.4" fill="#c98e74" transform="rotate(-22 34 9)"></ellipse>
        <ellipse cx="27" cy="23" rx="8" ry="3.4" fill="#c98e74" transform="rotate(22 27 23)"></ellipse>
        <circle cx="54" cy="16" r="3.2" fill="#b07a5e"></circle>
      </svg>
      <span class="divider__line"></span>
    </div>
  </div>
</section>
