<section id="menu" class="section section--blush menu">
  <div class="menu__inner">
    <div class="menu__head">
      <div class="eyebrow section-eyebrow">{{ site.menu.eyebrow }}</div>
      <h2 class="section-title">{{ site.menu.heading }}</h2>
      <p class="menu__note">{{ site.menu.note }}</p>
    </div>

    <div class="menu__list">
      {% for item in site.data.menu %}
        <div class="menu__item">
          <div class="menu__row">
            <span class="menu__name">{{ item.name }}</span>
            <span class="leader"></span>
            <span class="menu__price">{{ item.price }}</span>
          </div>
          {% if item.description and item.description != "" %}
            <p class="menu__desc">{{ item.description }}</p>
          {% endif %}
        </div>
      {% endfor %}
    </div>
  </div>
</section>
